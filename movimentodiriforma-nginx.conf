# ============================================================================
# NGINX CONFIGURATION FOR MOVIMENTODIRIFORMA.IT
# ============================================================================
#
# Questo file configura nginx come reverse proxy per:
# - Frontend React: /var/www/movimentodiriforma/sdarmitalia/dist (port 443/80)
# - Backend Node.js: localhost:5001 (/api)
#
# INSTALLAZIONE:
# 1. Salva come: /etc/nginx/sites-available/movimentodiriforma.it
# 2. Abilita: ln -s /etc/nginx/sites-available/movimentodiriforma.it /etc/nginx/sites-enabled/
# 3. Test: nginx -t
# 4. Reload: systemctl reload nginx
# 5. Ottieni certificato SSL: certbot --nginx -d movimentodiriforma.it -d www.movimentodiriforma.it
#
# ============================================================================

# ===== HTTP REDIRECT TO HTTPS =====
server {
    listen 80;
    listen [::]:80;
    
    server_name movimentodiriforma.it www.movimentodiriforma.it;
    
    # Acme challenge per Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ===== MAIN HTTPS SERVER =====
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name movimentodiriforma.it www.movimentodiriforma.it;
    
    # ===== SSL CERTIFICATES (Certbot) =====
    # NOTA: Questi path verranno creati automaticamente da certbot
    # Se non hai ancora i certificati, commenta queste righe e usa prima certbot
    ssl_certificate /etc/letsencrypt/live/movimentodiriforma.it/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/movimentodiriforma.it/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # ===== SSL CONFIGURATION =====
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # ===== SECURITY HEADERS =====
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # ===== LOG FILES =====
    access_log /var/log/nginx/movimentodiriforma.it-access.log;
    error_log /var/log/nginx/movimentodiriforma.it-error.log;
    
    # ===== GZIP COMPRESSION =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json;
    
    # ===== RATE LIMITING =====
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_status 429;
    
    # ===== ROOT DIRECTORY =====
    root /var/www/movimentodiriforma/sdarmitalia/dist;
    index index.html;
    
    # ===== BACKEND API PROXY =====
    location /api {
        # Rate limiting per API
        limit_req zone=api_limit burst=20 nodelay;
        
        # Proxy al backend Node.js
        proxy_pass http://localhost:5001;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Cache
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;
    }
    
    # ===== STATIC ASSETS =====
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # ===== FRONTEND ROUTING (SPA) =====
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache per HTML
        add_header Cache-Control "no-cache, must-revalidate";
    }
    
    # ===== HEALTH CHECK =====
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
    
    # ===== DENY HIDDEN FILES =====
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ===== ERROR PAGES =====
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

